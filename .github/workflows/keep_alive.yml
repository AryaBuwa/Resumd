name: Keep Resumd Alive

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:        # manual trigger if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Resumd
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://resumd.streamlit.app
          echo "Pinged resumd.streamlit.app"